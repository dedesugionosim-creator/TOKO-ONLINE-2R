<!-- ===== BLOK 5.2 - KELOLA IKLAN ===== -->
<script>
    // ===== BLOK 5.2.1 - RENDER MENU IKLAN =====
    function renderMenuIklan() {
        var areaKonten = document.getElementById('mainContent');
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        var html = '<div class="page-header"><h2>Kelola Iklan Sponsor</h2><p>Kelola iklan yang ditampilkan di dashboard semua pengguna.</p></div>';
        html += '<div style="margin-bottom:20px;"><button class="button button-primary" onclick="bukaFormIklan()"><i class="fas fa-plus"></i> Tambah Iklan</button></div>';
        if (dataIklan.length === 0) {
            html += '<div class="card"><div class="empty-state"><i class="fas fa-ad"></i><h3>Belum ada iklan</h3></div></div>';
        } else {
            html += '<div class="card"><div class="table-container"><table class="table"><thead><tr><th>No</th><th>Judul</th><th>Deskripsi</th><th>Warna</th><th>Gambar</th><th>Aksi</th></tr></thead><tbody>';
            for (var i = 0; i < dataIklan.length; i++) {
                var iklan = dataIklan[i];
                html += '<tr><td>' + (i+1) + '</td><td>' + escapeHtml(iklan.judul) + '</td><td>' + escapeHtml(iklan.deskripsi) + '</td><td><span style="display:inline-block;width:30px;height:30px;background:' + (iklan.warna || '#FF6B00') + ';border-radius:4px;"></span></td><td>';
                if (iklan.gambar) {
                    html += '<img src="' + iklan.gambar + '" style="width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer;" onclick="previewGambar(\'' + iklan.gambar + '\',\'Preview Iklan\')">';
                } else {
                    html += '-';
                }
                html += '</td><td><button class="button button-primary button-extra-small" onclick="editIklan(' + i + ')"><i class="fas fa-edit"></i> Edit</button><button class="button button-danger button-extra-small" onclick="hapusIklan(' + i + ')"><i class="fas fa-trash"></i> Hapus</button></td></tr>';
            }
            html += '</tbody></table></div></div>';
        }
        html += '<div id="formIklanContainer" class="hidden" style="margin-top:20px;"><div class="card"><div class="card-header"><span id="formIklanTitle">Tambah Iklan Baru</span><button class="button button-danger button-small" onclick="tutupFormIklan()"><i class="fas fa-times"></i> Tutup</button></div>';
        html += '<div class="grid-2"><div><label class="form-label">Judul Iklan</label><input type="text" id="iklanJudul" class="form-input" placeholder="Judul iklan"></div>';
        html += '<div><label class="form-label">Warna Latar (opsional)</label><input type="color" id="iklanWarna" class="form-input" value="#FF6B00" style="padding:2px;height:40px;"></div>';
        html += '<div><label class="form-label">Deskripsi</label><input type="text" id="iklanDeskripsi" class="form-input" placeholder="Deskripsi singkat"></div>';
        html += '<div><label class="form-label">Gambar (opsional)</label><input type="file" id="iklanGambar" accept=".jpg,.jpeg,.png" style="display:none;">';
        html += '<button class="button button-primary button-small" onclick="document.getElementById(\'iklanGambar\').click();">Pilih Gambar</button>';
        html += '<span id="iklanNamaGambar" style="font-size:12px;color:#888;margin-left:10px;">Belum ada gambar</span></div></div>';
        html += '<input type="hidden" id="iklanEditIndex" value="-1">';
        html += '<button class="button button-primary margin-top-10" onclick="simpanIklan()"><i class="fas fa-save"></i> Simpan Iklan</button></div></div>';
        areaKonten.innerHTML = html;
        setTimeout(function() {
            var inputGambar = document.getElementById('iklanGambar');
            if (inputGambar) {
                inputGambar.onchange = function(e) {
                    var file = e.target.files[0];
                    if (file) {
                        document.getElementById('iklanNamaGambar').textContent = file.name;
                        var pembaca = new FileReader();
                        pembaca.onload = function(ev) { localStorage.setItem('2r_iklan_gambar_temp', ev.target.result); };
                        pembaca.readAsDataURL(file);
                    }
                };
            }
        }, 300);
    }
    // ===== AKHIR BLOK 5.2.1 =====

    // ===== BLOK 5.2.2 - BUKA FORM TAMBAH/EDIT IKLAN =====
    function bukaFormIklan() {
        document.getElementById('formIklanContainer').classList.remove('hidden');
        document.getElementById('formIklanTitle').textContent = 'Tambah Iklan Baru';
        document.getElementById('iklanEditIndex').value = '-1';
        document.getElementById('iklanJudul').value = '';
        document.getElementById('iklanDeskripsi').value = '';
        document.getElementById('iklanWarna').value = '#FF6B00';
        document.getElementById('iklanNamaGambar').textContent = 'Belum ada gambar';
        localStorage.removeItem('2r_iklan_gambar_temp');
        document.getElementById('formIklanContainer').scrollIntoView({ behavior: 'smooth' });
    }
    // ===== AKHIR BLOK 5.2.2 =====

    // ===== BLOK 5.2.3 - TUTUP FORM IKLAN =====
    function tutupFormIklan() {
        document.getElementById('formIklanContainer').classList.add('hidden');
    }
    // ===== AKHIR BLOK 5.2.3 =====

    // ===== BLOK 5.2.4 - SIMPAN IKLAN =====
    function simpanIklan() {
        var judul = document.getElementById('iklanJudul').value.trim();
        var deskripsi = document.getElementById('iklanDeskripsi').value.trim();
        var warna = document.getElementById('iklanWarna').value;
        var gambarTemp = localStorage.getItem('2r_iklan_gambar_temp') || '';
        var editIndex = parseInt(document.getElementById('iklanEditIndex').value);
        if (!judul || !deskripsi) {
            tampilkanToast('Judul dan deskripsi wajib diisi!', 'warning');
            return;
        }
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        if (editIndex === -1) {
            dataIklan.push({
                id: Date.now(),
                judul: judul,
                deskripsi: deskripsi,
                warna: warna,
                gambar: gambarTemp || ''
            });
            tampilkanToast('Iklan berhasil ditambahkan!', 'success');
        } else {
            dataIklan[editIndex].judul = judul;
            dataIklan[editIndex].deskripsi = deskripsi;
            dataIklan[editIndex].warna = warna;
            if (gambarTemp) {
                dataIklan[editIndex].gambar = gambarTemp;
            }
            tampilkanToast('Iklan berhasil diperbarui!', 'success');
        }
        localStorage.setItem('2r_iklan', JSON.stringify(dataIklan));
        localStorage.removeItem('2r_iklan_gambar_temp');
        tutupFormIklan();
        renderMenuIklan();
    }
    // ===== AKHIR BLOK 5.2.4 =====

    // ===== BLOK 5.2.5 - EDIT IKLAN =====
    function editIklan(index) {
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        if (index < 0 || index >= dataIklan.length) {
            tampilkanToast('Iklan tidak ditemukan!', 'error');
            return;
        }
        var iklan = dataIklan[index];
        document.getElementById('formIklanContainer').classList.remove('hidden');
        document.getElementById('formIklanTitle').textContent = 'Edit Iklan';
        document.getElementById('iklanEditIndex').value = index;
        document.getElementById('iklanJudul').value = iklan.judul;
        document.getElementById('iklanDeskripsi').value = iklan.deskripsi;
        document.getElementById('iklanWarna').value = iklan.warna || '#FF6B00';
        document.getElementById('iklanNamaGambar').textContent = iklan.gambar ? 'Gambar sudah ada (klik untuk ganti)' : 'Belum ada gambar';
        localStorage.removeItem('2r_iklan_gambar_temp');
        document.getElementById('formIklanContainer').scrollIntoView({ behavior: 'smooth' });
    }
    // ===== AKHIR BLOK 5.2.5 =====

    // ===== BLOK 5.2.6 - HAPUS IKLAN =====
    function hapusIklan(index) {
        if (!confirm('Yakin ingin menghapus iklan ini?')) return;
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        dataIklan.splice(index, 1);
        localStorage.setItem('2r_iklan', JSON.stringify(dataIklan));
        renderMenuIklan();
        tampilkanToast('Iklan dihapus!', 'success');
    }
    // ===== AKHIR BLOK 5.2.6 =====
</script>
<!-- ===== AKHIR BLOK 5.2 ===== -->

<!-- ===== BLOK 5.3 - TRANSFER MENU ===== -->
<script>
    // ===== BLOK 5.3.1 - RENDER HALAMAN TRANSFER MENU =====
    function renderTransferMenu() {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Anda tidak memiliki akses ke halaman ini!', 'error');
            return;
        }
        var areaKonten = document.getElementById('mainContent');
        var html = '<div class="page-header"><h2>Transfer Menu</h2><p>Pilih kategori menu yang ingin Anda transfer ke akun target.</p></div>';
        html += '<div class="widget-grid">';
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferUploadProduk()"><div class="widget-icon" style="color:#FF6B00;"><i class="fas fa-upload"></i></div><div class="widget-number" style="font-size:18px;">Upload Produk Publik</div><div class="widget-label">Atur akses upload produk untuk toko</div></div>';
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferTransaksi()"><div class="widget-icon" style="color:#2196F3;"><i class="fas fa-credit-card"></i></div><div class="widget-number" style="font-size:18px;">Transaksi</div><div class="widget-label">Atur akses kasir, pembayaran, laporan</div></div>';
        html += '<div class="widget-card" style="cursor:pointer;" onclick="renderTransferLainnya()"><div class="widget-icon" style="color:#4CAF50;"><i class="fas fa-cogs"></i></div><div class="widget-number" style="font-size:18px;">Menu Lainnya</div><div class="widget-label">Atur akses menu tambahan lainnya</div></div>';
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    // ===== AKHIR BLOK 5.3.1 =====

    // ===== BLOK 5.3.2 - TRANSFER UPLOAD PRODUK PUBLIK =====
    function renderTransferUploadProduk() {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Anda tidak memiliki akses!', 'error');
            return;
        }
        var areaKonten = document.getElementById('mainContent');
        var dataAkun = getDataAkun();
        var daftarToko = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].role === 'toko') {
                daftarToko.push(dataAkun[i]);
            }
        }
        var html = '<div class="page-header"><h2>Transfer Upload Produk Publik</h2><p>Pilih toko yang ingin Anda aktifkan/nonaktifkan fitur upload produk publik.</p>';
        html += '<button class="button button-primary button-small" onclick="renderTransferMenu()"><i class="fas fa-arrow-left"></i> Kembali</button></div>';
        html += '<div class="card"><div class="card-header">Daftar Toko <span style="font-weight:normal;font-size:13px;color:#888;">(Total: ' + daftarToko.length + ')</span></div>';
        if (daftarToko.length === 0) {
            html += '<div class="empty-state"><i class="fas fa-store"></i><h3>Belum ada toko</h3></div>';
        } else {
            html += '<div class="table-container"><table class="table"><thead><tr><th>Nomor</th><th>ID</th><th>Username</th><th>Nama</th><th>Status Upload Publik</th><th>Aksi</th></tr></thead><tbody>';
            for (var i = 0; i < daftarToko.length; i++) {
                var toko = daftarToko[i];
                var statusUpload = toko.fitur && toko.fitur.uploadProdukPublik ? 'Aktif' : 'Nonaktif';
                var badge = statusUpload === 'Aktif' ? 'badge-success' : 'badge-danger';
                html += '<tr><td>' + (i+1) + '</td><td>' + toko.id + '</td><td>' + toko.username + '</td><td>' + toko.nama + '</td><td><span class="badge ' + badge + '">' + statusUpload + '</span></td><td>';
                if (statusUpload === 'Aktif') {
                    html += '<button class="button button-danger button-extra-small" onclick="nonaktifkanUploadPublik(\'' + toko.id + '\')">Nonaktifkan</button>';
                } else {
                    html += '<button class="button button-success button-extra-small" onclick="aktifkanUploadPublik(\'' + toko.id + '\')">Aktifkan</button>';
                }
                html += '</td></tr>';
            }
            html += '</tbody></table></div>';
        }
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    // ===== AKHIR BLOK 5.3.2 =====

    // ===== BLOK 5.3.3 - AKTIFKAN UPLOAD PRODUK PUBLIK =====
    function aktifkanUploadPublik(id) {
        if (!confirm('Aktifkan fitur Upload Produk Publik untuk toko ini?')) return;
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === id) {
                if (!dataAkun[i].fitur) dataAkun[i].fitur = {};
                dataAkun[i].fitur.uploadProdukPublik = true;
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderTransferUploadProduk();
        tampilkanToast('Fitur Upload Produk Publik telah diaktifkan!', 'success');
    }
    // ===== AKHIR BLOK 5.3.3 =====

    // ===== BLOK 5.3.4 - NONAKTIFKAN UPLOAD PRODUK PUBLIK =====
    function nonaktifkanUploadPublik(id) {
        if (!confirm('Nonaktifkan fitur Upload Produk Publik untuk toko ini?')) return;
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === id) {
                if (dataAkun[i].fitur) {
                    dataAkun[i].fitur.uploadProdukPublik = false;
                }
                break;
            }
        }
        simpanDataAkun(dataAkun);
        renderTransferUploadProduk();
        tampilkanToast('Fitur Upload Produk Publik telah dinonaktifkan!', 'success');
    }
    // ===== AKHIR BLOK 5.3.4 =====

    // ===== BLOK 5.3.5 - TRANSFER TRANSAKSI & LAINNYA (PLACEHOLDER) =====
    function renderTransferTransaksi() {
        renderPlaceholder('Transfer Transaksi');
    }
    function renderTransferLainnya() {
        renderPlaceholder('Transfer Menu Lainnya');
    }
    // ===== AKHIR BLOK 5.3.5 =====
</script>
<!-- ===== AKHIR BLOK 5.3 ===== -->

<!-- ===== BLOK 5.4 - KELOLA WILAYAH ===== -->
<script>
    // ===== BLOK 5.4.1 - RENDER HALAMAN KELOLA WILAYAH =====
    function renderKelolaWilayah() {
        var areaKonten = document.getElementById('mainContent');
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var html = '<div class="page-header"><h2>Kelola Wilayah Indonesia</h2><p>SuperAdmin dapat menambahkan, mengedit, atau menghapus data wilayah (Provinsi, Kabupaten, Kecamatan, Kelurahan, Kode Pos).</p></div>';
        html += '<div class="card"><div class="card-header">Tambah Wilayah Baru</div><div class="grid-2">';
        html += '<div><label class="form-label">Provinsi</label><input type="text" id="wilProvinsi" class="form-input" placeholder="Contoh: DKI Jakarta"></div>';
        html += '<div><label class="form-label">Kabupaten / Kota</label><input type="text" id="wilKabupaten" class="form-input" placeholder="Contoh: Jakarta Pusat"></div>';
        html += '<div><label class="form-label">Kecamatan</label><input type="text" id="wilKecamatan" class="form-input" placeholder="Contoh: Gambir"></div>';
        html += '<div><label class="form-label">Kelurahan / Desa</label><input type="text" id="wilDesa" class="form-input" placeholder="Contoh: Gambir"></div>';
        html += '<div><label class="form-label">Kode Pos</label><input type="text" id="wilKodepos" class="form-input" placeholder="Contoh: 10230"></div>';
        html += '</div><button class="button button-primary margin-top-10" onclick="tambahWilayah()"><i class="fas fa-plus"></i> Tambah Wilayah</button></div>';
        html += '<div class="card"><div class="card-header">Daftar Wilayah Tersimpan <span style="font-weight:normal;font-size:13px;color:#888;">(Total: ' + dataWilayah.length + ' data)</span></div>';
        if (dataWilayah.length === 0) {
            html += '<div class="empty-state"><i class="fas fa-map"></i><h3>Belum ada data wilayah</h3></div>';
        } else {
            html += '<div class="table-container"><table class="table"><thead><tr><th>No</th><th>Provinsi</th><th>Kabupaten</th><th>Kecamatan</th><th>Kelurahan</th><th>Kode Pos</th><th>Aksi</th></tr></thead><tbody>';
            for (var i = 0; i < dataWilayah.length; i++) {
                var w = dataWilayah[i];
                html += '<tr><td>' + (i+1) + '</td><td>' + escapeHtml(w.provinsi) + '</td><td>' + escapeHtml(w.kabupaten) + '</td><td>' + escapeHtml(w.kecamatan) + '</td><td>' + escapeHtml(w.desa) + '</td><td>' + (w.kodepos || '-') + '</td><td><div style="display:flex; gap:5px; flex-wrap:wrap;">';
                html += '<button class="button button-primary button-extra-small" onclick="bukaModalEditWilayah(' + i + ')"><i class="fas fa-edit"></i> Edit</button>';
                html += '<button class="button button-success button-extra-small" onclick="isiProfilDariWilayah(' + i + ')"><i class="fas fa-user-check"></i> Isi Profil</button>';
                html += '<button class="button button-danger button-extra-small" onclick="hapusWilayah(' + i + ')"><i class="fas fa-trash"></i> Hapus</button>';
                html += '</div></td></tr>';
            }
            html += '</tbody></table></div>';
        }
        html += '</div>';
        areaKonten.innerHTML = html;
    }
    // ===== AKHIR BLOK 5.4.1 =====

    // ===== BLOK 5.4.2 - TAMBAH WILAYAH =====
    function tambahWilayah() {
        var provinsi = document.getElementById('wilProvinsi').value.trim();
        var kabupaten = document.getElementById('wilKabupaten').value.trim();
        var kecamatan = document.getElementById('wilKecamatan').value.trim();
        var desa = document.getElementById('wilDesa').value.trim();
        var kodepos = document.getElementById('wilKodepos').value.trim();
        if (!provinsi || !kabupaten || !kecamatan || !desa || !kodepos) {
            tampilkanToast('Semua data wajib diisi!', 'warning');
            return;
        }
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        for (var i = 0; i < dataWilayah.length; i++) {
            if (dataWilayah[i].provinsi.toLowerCase() === provinsi.toLowerCase() &&
                dataWilayah[i].kabupaten.toLowerCase() === kabupaten.toLowerCase() &&
                dataWilayah[i].kecamatan.toLowerCase() === kecamatan.toLowerCase() &&
                dataWilayah[i].desa.toLowerCase() === desa.toLowerCase()) {
                tampilkanToast('Data wilayah sudah ada!', 'warning');
                return;
            }
        }
        dataWilayah.push({
            id: Date.now(),
            provinsi: provinsi,
            kabupaten: kabupaten,
            kecamatan: kecamatan,
            desa: desa,
            kodepos: kodepos
        });
        localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
        document.getElementById('wilProvinsi').value = '';
        document.getElementById('wilKabupaten').value = '';
        document.getElementById('wilKecamatan').value = '';
        document.getElementById('wilDesa').value = '';
        document.getElementById('wilKodepos').value = '';
        renderKelolaWilayah();
        tampilkanToast('Wilayah berhasil ditambahkan!', 'success');
    }
    // ===== AKHIR BLOK 5.4.2 =====

    // ===== BLOK 5.4.3 - HAPUS WILAYAH =====
    function hapusWilayah(index) {
        if (!confirm('Yakin ingin menghapus data wilayah ini?')) return;
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        dataWilayah.splice(index, 1);
        localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
        renderKelolaWilayah();
        tampilkanToast('Wilayah dihapus!', 'success');
    }
    // ===== AKHIR BLOK 5.4.3 =====

    // ===== BLOK 5.4.4 - EDIT WILAYAH (PROMPT) =====
    function editWilayah(index) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var w = dataWilayah[index];
        var provinsiBaru = prompt('Provinsi:', w.provinsi);
        if (provinsiBaru === null) return;
        var kabupatenBaru = prompt('Kabupaten/Kota:', w.kabupaten);
        if (kabupatenBaru === null) return;
        var kecamatanBaru = prompt('Kecamatan:', w.kecamatan);
        if (kecamatanBaru === null) return;
        var desaBaru = prompt('Kelurahan/Desa:', w.desa);
        if (desaBaru === null) return;
        var kodeposBaru = prompt('Kode Pos:', w.kodepos);
        if (kodeposBaru === null) return;
        dataWilayah[index].provinsi = provinsiBaru.trim();
        dataWilayah[index].kabupaten = kabupatenBaru.trim();
        dataWilayah[index].kecamatan = kecamatanBaru.trim();
        dataWilayah[index].desa = desaBaru.trim();
        dataWilayah[index].kodepos = kodeposBaru.trim();
        localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
        renderKelolaWilayah();
        tampilkanToast('Wilayah diperbarui!', 'success');
    }
    // ===== AKHIR BLOK 5.4.4 =====

    // ===== BLOK 5.4.5 - BUKA MODAL EDIT WILAYAH =====
    function bukaModalEditWilayah(index) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        if (index < 0 || index >= dataWilayah.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        var w = dataWilayah[index];
        document.getElementById('editWilayahIndex').value = index;
        document.getElementById('editWilProvinsi').value = w.provinsi;
        document.getElementById('editWilKabupaten').value = w.kabupaten;
        document.getElementById('editWilKecamatan').value = w.kecamatan;
        document.getElementById('editWilDesa').value = w.desa;
        document.getElementById('editWilKodepos').value = w.kodepos;
        bukaModal('modalEditWilayah');
    }
    // ===== AKHIR BLOK 5.4.5 =====

    // ===== BLOK 5.4.6 - SIMPAN EDIT WILAYAH (DARI MODAL) =====
    function simpanEditWilayah() {
        var index = parseInt(document.getElementById('editWilayahIndex').value);
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        if (index < 0 || index >= dataWilayah.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        dataWilayah[index].provinsi = document.getElementById('editWilProvinsi').value.trim();
        dataWilayah[index].kabupaten = document.getElementById('editWilKabupaten').value.trim();
        dataWilayah[index].kecamatan = document.getElementById('editWilKecamatan').value.trim();
        dataWilayah[index].desa = document.getElementById('editWilDesa').value.trim();
        dataWilayah[index].kodepos = document.getElementById('editWilKodepos').value.trim();
        localStorage.setItem('2r_data_wilayah', JSON.stringify(dataWilayah));
        tutupModal('modalEditWilayah');
        renderKelolaWilayah();
        tampilkanToast('Data wilayah berhasil diperbarui!', 'success');
    }
    // ===== AKHIR BLOK 5.4.6 =====

    // ===== BLOK 5.4.7 - ISI PROFIL DARI WILAYAH (SUPERADMIN) =====
    function isiProfilDariWilayah(index) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        if (index < 0 || index >= dataWilayah.length) {
            tampilkanToast('Data tidak ditemukan!', 'error');
            return;
        }
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        if (user.role !== 'superadmin') {
            tampilkanToast('Fitur ini hanya untuk SuperAdmin!', 'error');
            return;
        }
        var w = dataWilayah[index];
        var alamatLengkap = w.desa + ', ' + w.kecamatan + ', ' + w.kabupaten + ', ' + w.provinsi + ' - Kode Pos: ' + w.kodepos;
        user.alamat = alamatLengkap;
        var dataAkun = getDataAkun();
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                dataAkun[i].alamat = alamatLengkap;
                break;
            }
        }
        localStorage.setItem('2r_user', JSON.stringify(user));
        simpanDataAkun(dataAkun);
        document.getElementById('userNama').textContent = user.nama;
        tampilkanToast('Alamat profil SuperAdmin berhasil diperbarui!', 'success');
    }
    // ===== AKHIR BLOK 5.4.7 =====
</script>
<!-- ===== AKHIR BLOK 5.4 ===== -->

<!-- ===== BLOK 5.5 - UTILITY WILAYAH ===== -->
<script>
    // ===== BLOK 5.5.1 - GET PROVINSI LIST =====
    function getProvinsiList() {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var list = [];
        var set = new Set();
        for (var i = 0; i < dataWilayah.length; i++) {
            if (!set.has(dataWilayah[i].provinsi)) {
                set.add(dataWilayah[i].provinsi);
                list.push(dataWilayah[i].provinsi);
            }
        }
        return list;
    }
    // ===== AKHIR BLOK 5.5.1 =====

    // ===== BLOK 5.5.2 - GET KABUPATEN LIST =====
    function getKabupatenList(provinsi) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var list = [];
        var set = new Set();
        for (var i = 0; i < dataWilayah.length; i++) {
            if (dataWilayah[i].provinsi === provinsi && !set.has(dataWilayah[i].kabupaten)) {
                set.add(dataWilayah[i].kabupaten);
                list.push(dataWilayah[i].kabupaten);
            }
        }
        return list;
    }
    // ===== AKHIR BLOK 5.5.2 =====

    // ===== BLOK 5.5.3 - GET KECAMATAN LIST =====
    function getKecamatanList(provinsi, kabupaten) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var list = [];
        var set = new Set();
        for (var i = 0; i < dataWilayah.length; i++) {
            if (dataWilayah[i].provinsi === provinsi && dataWilayah[i].kabupaten === kabupaten && !set.has(dataWilayah[i].kecamatan)) {
                set.add(dataWilayah[i].kecamatan);
                list.push(dataWilayah[i].kecamatan);
            }
        }
        return list;
    }
    // ===== AKHIR BLOK 5.5.3 =====

    // ===== BLOK 5.5.4 - GET DESA LIST =====
    function getDesaList(provinsi, kabupaten, kecamatan) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        var list = [];
        var set = new Set();
        for (var i = 0; i < dataWilayah.length; i++) {
            if (dataWilayah[i].provinsi === provinsi && dataWilayah[i].kabupaten === kabupaten &&
                dataWilayah[i].kecamatan === kecamatan && !set.has(dataWilayah[i].desa)) {
                set.add(dataWilayah[i].desa);
                list.push(dataWilayah[i].desa);
            }
        }
        return list;
    }
    // ===== AKHIR BLOK 5.5.4 =====

    // ===== BLOK 5.5.5 - GET KODE POS =====
    function getKodePos(provinsi, kabupaten, kecamatan, desa) {
        var dataWilayah = JSON.parse(localStorage.getItem('2r_data_wilayah') || '[]');
        for (var i = 0; i < dataWilayah.length; i++) {
            if (dataWilayah[i].provinsi === provinsi && dataWilayah[i].kabupaten === kabupaten &&
                dataWilayah[i].kecamatan === kecamatan && dataWilayah[i].desa === desa) {
                return dataWilayah[i].kodepos;
            }
        }
        return '';
    }
    // ===== AKHIR BLOK 5.5.5 =====

    // ===== BLOK 5.5.6 - ON CHANGE PROVINSI MANUAL =====
    function onChangeProvinsiManual(prefix) {
        var provinsi = document.getElementById(prefix + 'Provinsi').value;
        var kabupaten = document.getElementById(prefix + 'Kabupaten');
        var kecamatan = document.getElementById(prefix + 'Kecamatan');
        var desa = document.getElementById(prefix + 'Desa');
        kabupaten.innerHTML = '<option value="">-- Pilih Kabupaten --</option>';
        kecamatan.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
        desa.innerHTML = '<option value="">-- Pilih Kelurahan --</option>';
        if (provinsi) {
            var list = getKabupatenList(provinsi);
            for (var i = 0; i < list.length; i++) {
                var opt = document.createElement('option');
                opt.value = list[i];
                opt.textContent = list[i];
                kabupaten.appendChild(opt);
            }
        }
    }
    // ===== AKHIR BLOK 5.5.6 =====

    // ===== BLOK 5.5.7 - ON CHANGE KABUPATEN MANUAL =====
    function onChangeKabupatenManual(prefix) {
        var provinsi = document.getElementById(prefix + 'Provinsi').value;
        var kabupaten = document.getElementById(prefix + 'Kabupaten').value;
        var kecamatan = document.getElementById(prefix + 'Kecamatan');
        var desa = document.getElementById(prefix + 'Desa');
        kecamatan.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
        desa.innerHTML = '<option value="">-- Pilih Kelurahan --</option>';
        if (provinsi && kabupaten) {
            var list = getKecamatanList(provinsi, kabupaten);
            for (var i = 0; i < list.length; i++) {
                var opt = document.createElement('option');
                opt.value = list[i];
                opt.textContent = list[i];
                kecamatan.appendChild(opt);
            }
        }
    }
    // ===== AKHIR BLOK 5.5.7 =====

    // ===== BLOK 5.5.8 - ON CHANGE KECAMATAN MANUAL =====
    function onChangeKecamatanManual(prefix) {
        var provinsi = document.getElementById(prefix + 'Provinsi').value;
        var kabupaten = document.getElementById(prefix + 'Kabupaten').value;
        var kecamatan = document.getElementById(prefix + 'Kecamatan').value;
        var desa = document.getElementById(prefix + 'Desa');
        desa.innerHTML = '<option value="">-- Pilih Kelurahan --</option>';
        if (provinsi && kabupaten && kecamatan) {
            var list = getDesaList(provinsi, kabupaten, kecamatan);
            for (var i = 0; i < list.length; i++) {
                var opt = document.createElement('option');
                opt.value = list[i];
                opt.textContent = list[i];
                desa.appendChild(opt);
            }
        }
    }
    // ===== AKHIR BLOK 5.5.8 =====

    // ===== BLOK 5.5.9 - ON CHANGE DESA MANUAL =====
    function onChangeDesaManual(prefix) {
        var provinsi = document.getElementById(prefix + 'Provinsi').value;
        var kabupaten = document.getElementById(prefix + 'Kabupaten').value;
        var kecamatan = document.getElementById(prefix + 'Kecamatan').value;
        var desa = document.getElementById(prefix + 'Desa').value;
        var kodeposInput = document.getElementById(prefix + 'Kodepos');
        if (provinsi && kabupaten && kecamatan && desa) {
            var kode = getKodePos(provinsi, kabupaten, kecamatan, desa);
            kodeposInput.value = kode || '';
        } else {
            kodeposInput.value = '';
        }
    }
    // ===== AKHIR BLOK 5.5.9 =====

    // ===== BLOK 5.5.10 - LOAD DATA WILAYAH TERSIMPAN =====
    function loadDataWilayahTersimpan(prefix, user) {
        var provinsiDropdown = document.getElementById(prefix + 'Provinsi');
        var kabupatenDropdown = document.getElementById(prefix + 'Kabupaten');
        var kecamatanDropdown = document.getElementById(prefix + 'Kecamatan');
        var desaDropdown = document.getElementById(prefix + 'Desa');
        var userKey = prefix === 'ktp' ? 'ktp' : 'dom';
        if (user[userKey + 'Provinsi'] && provinsiDropdown) {
            provinsiDropdown.value = user[userKey + 'Provinsi'];
            onChangeProvinsiManual(prefix);
            if (user[userKey + 'Kabupaten'] && kabupatenDropdown) {
                kabupatenDropdown.value = user[userKey + 'Kabupaten'];
                onChangeKabupatenManual(prefix);
                if (user[userKey + 'Kecamatan'] && kecamatanDropdown) {
                    kecamatanDropdown.value = user[userKey + 'Kecamatan'];
                    onChangeKecamatanManual(prefix);
                    if (user[userKey + 'Desa'] && desaDropdown) {
                        desaDropdown.value = user[userKey + 'Desa'];
                    }
                }
            }
        }
    }
    // ===== AKHIR BLOK 5.5.10 =====

    // ===== BLOK 5.5.11 - ISI DROPDOWN WILAYAH =====
    function isiDropdownWilayah(prefix) {
        var provinsiDropdown = document.getElementById(prefix + 'Provinsi');
        if (!provinsiDropdown) return;
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var key = prefix === 'ktp' ? 'ktp' : 'dom';
        var provinsiTersimpan = user[key + 'Provinsi'] || '';
        var kabupatenTersimpan = user[key + 'Kabupaten'] || '';
        var kecamatanTersimpan = user[key + 'Kecamatan'] || '';
        var desaTersimpan = user[key + 'Desa'] || '';
        var provinsiList = getProvinsiList();
        provinsiDropdown.innerHTML = '<option value="">-- Pilih Provinsi --</option>';
        for (var i = 0; i < provinsiList.length; i++) {
            var selected = (provinsiTersimpan === provinsiList[i]) ? 'selected' : '';
            provinsiDropdown.innerHTML += '<option value="' + provinsiList[i] + '" ' + selected + '>' + provinsiList[i] + '</option>';
        }
        if (provinsiTersimpan) {
            var kabupatenList = getKabupatenList(provinsiTersimpan);
            var kabupatenDropdown = document.getElementById(prefix + 'Kabupaten');
            kabupatenDropdown.innerHTML = '<option value="">-- Pilih Kabupaten --</option>';
            for (var i = 0; i < kabupatenList.length; i++) {
                var selected = (kabupatenTersimpan === kabupatenList[i]) ? 'selected' : '';
                kabupatenDropdown.innerHTML += '<option value="' + kabupatenList[i] + '" ' + selected + '>' + kabupatenList[i] + '</option>';
            }
            if (kabupatenTersimpan) {
                var kecamatanList = getKecamatanList(provinsiTersimpan, kabupatenTersimpan);
                var kecamatanDropdown = document.getElementById(prefix + 'Kecamatan');
                kecamatanDropdown.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
                for (var i = 0; i < kecamatanList.length; i++) {
                    var selected = (kecamatanTersimpan === kecamatanList[i]) ? 'selected' : '';
                    kecamatanDropdown.innerHTML += '<option value="' + kecamatanList[i] + '" ' + selected + '>' + kecamatanList[i] + '</option>';
                }
                if (kecamatanTersimpan) {
                    var desaList = getDesaList(provinsiTersimpan, kabupatenTersimpan, kecamatanTersimpan);
                    var desaDropdown = document.getElementById(prefix + 'Desa');
                    desaDropdown.innerHTML = '<option value="">-- Pilih Kelurahan --</option>';
                    for (var i = 0; i < desaList.length; i++) {
                        var selected = (desaTersimpan === desaList[i]) ? 'selected' : '';
                        desaDropdown.innerHTML += '<option value="' + desaList[i] + '" ' + selected + '>' + desaList[i] + '</option>';
                    }
                    if (desaTersimpan) {
                        var kodePos = getKodePos(provinsiTersimpan, kabupatenTersimpan, kecamatanTersimpan, desaTersimpan);
                        if (kodePos) {
                            document.getElementById(prefix + 'Kodepos').value = kodePos;
                        }
                    }
                }
            }
        }
    }
    // ===== AKHIR BLOK 5.5.11 =====
</script>
<!-- ===== AKHIR BLOK 5.5 ===== -->
