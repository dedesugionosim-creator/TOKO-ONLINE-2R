<script>
    function renderUlasanRating(filterRole) {
        var role = localStorage.getItem('2r_user_role');
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var areaKonten = document.getElementById('mainContent');
        if (!areaKonten) return;

        var dataUlasan = JSON.parse(localStorage.getItem('2r_ulasan') || '[]');
        var html = '<div class="page-header"><h2>Ulasan & Rating</h2><p>Lihat ulasan dari pelanggan. SuperAdmin dan Staf dapat memoderasi.</p></div>';

        // === FITUR OTOMATIS ID TARGET ===
        var lastTarget = localStorage.getItem('2r_last_review_target') || '';

        // === 1. TAMBAH ULASAN (HANYA UNTUK CUSTOMER) ===
        if (role === 'customer') {
            html += `
            <div class="card" style="border: 2px solid #FF6B00; margin-bottom:25px;">
                <div class="card-header" style="color:#FF6B00;">Tulis Ulasan Baru</div>
                <div class="grid-2">
                    <div><label class="form-label">ID Toko/Ojek Target</label>
                        <input type="text" id="ulasanTargetId" class="form-input" placeholder="Contoh: TOKO-001" value="${lastTarget}">
                    </div>
                    <div><label class="form-label">Rating</label>
                        <select id="ulasanRating" class="form-input">
                            <option value="5">⭐ 5 - Sangat Puas</option>
                            <option value="4">⭐ 4 - Puas</option>
                            <option value="3">⭐ 3 - Biasa Saja</option>
                            <option value="2">⭐ 2 - Kurang Puas</option>
                            <option value="1">⭐ 1 - Sangat Tidak Puas</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">Komentar Anda</label><textarea id="ulasanKomentar" class="form-input" rows="3" placeholder="Tulis pengalaman Anda..."></textarea></div>
                <button class="button button-primary" onclick="simpanUlasan()"><i class="fas fa-paper-plane"></i> Kirim Ulasan</button>
            </div>`;
        }

        // === 2. FILTER UNTUK SUPERADMIN & STAF ===
        if (role === 'superadmin' || role === 'staf_admin') {
            var selectedFilter = filterRole || 'semua';
            html += `<div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
                <label style="font-weight:600;">Filter Target Role:</label>
                <select id="filterRoleUlasan" class="form-input" style="width:auto; min-width:150px;" onchange="renderUlasanRating(this.value)">
                    <option value="semua" ${selectedFilter === 'semua' ? 'selected' : ''}>Semua Ulasan</option>
                    <option value="toko" ${selectedFilter === 'toko' ? 'selected' : ''}>Ulasan ke Toko</option>
                    <option value="ojek" ${selectedFilter === 'ojek' ? 'selected' : ''}>Ulasan ke Ojek</option>
                    <option value="pedagang" ${selectedFilter === 'pedagang' ? 'selected' : ''}>Ulasan ke Pedagang</option>
                </select>
            </div>`;
        }

        // === 3. FILTER DATA BERDASARKAN ROLE ===
        var dataFilter = [];
        if (role === 'superadmin' || role === 'staf_admin') {
            if (filterRole && filterRole !== 'semua') {
                dataFilter = dataUlasan.filter(function(u) { return u.targetRole === filterRole; });
            } else {
                dataFilter = dataUlasan;
            }
        } else if (role === 'toko' || role === 'ojek' || role === 'pedagang') {
            dataFilter = dataUlasan.filter(function(u) { return u.targetId === user.id; });
        } else {
            dataFilter = dataUlasan;
        }

        // === 4. RENDER GRID KARTU ULASAN ===
        if (dataFilter.length === 0) {
            html += '<div class="card"><div class="empty-state"><i class="fas fa-star-half-alt"></i><h3>Belum ada ulasan</h3></div></div>';
        } else {
            html += '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px;">';
            for (var i = 0; i < dataFilter.length; i++) {
                var u = dataFilter[i];
                var bintang = '';
                for (var b = 1; b <= 5; b++) {
                    bintang += (b <= u.rating) ? '⭐' : '☆';
                }

                var bisaHapus = (role === 'superadmin' || role === 'staf_admin');
                if (role === 'customer' && u.pengirimId === user.id) { bisaHapus = true; }

                var formBalasan = '';
                if ((role === 'toko' || role === 'ojek' || role === 'pedagang') && u.targetId === user.id) {
                    if (!u.balasan) {
                        formBalasan = `
                            <div style="display:flex; gap:5px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                                <input type="text" id="balasanInput_${i}" class="form-input" placeholder="Balas komentar ini..." style="flex:1;">
                                <button class="button button-primary button-small" onclick="kirimBalasan('${u.id}', ${i})"><i class="fas fa-reply"></i> Balas</button>
                            </div>`;
                    }
                }

                html += `
                <div style="background:white; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.08); border:1px solid #e9ecef; overflow:hidden; display:flex; flex-direction:column; padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <div><strong style="font-size:15px;">${escapeHtml(u.pengirimNama)}</strong> <span style="font-size:12px; color:#888; margin-left:10px;">→ ${escapeHtml(u.targetNama)}</span></div>
                        <div style="font-size:18px; letter-spacing:1px;">${bintang}</div>
                    </div>
                    <p style="font-size:15px; color:#333; line-height:1.6; margin:10px 0; flex:1;">"${escapeHtml(u.komentar)}"</p>
                    <div style="font-size:12px; color:#999; margin-top:5px;">${new Date(u.waktu).toLocaleDateString('id-ID')}</div>

                    ${u.balasan ? `
                    <div style="background:#f1f8e9; padding:10px; border-radius:8px; margin-top:10px; border-left:4px solid #4CAF50;">
                        <strong style="color:#2e7d32; font-size:13px;">Balasan ${escapeHtml(u.targetNama)}:</strong>
                        <p style="font-size:14px; margin:3px 0 0 0;">${escapeHtml(u.balasan)}</p>
                    </div>` : ''}

                    ${formBalasan}

                    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:15px; border-top:1px solid #f0f0f0; padding-top:12px;">
                        ${bisaHapus ? `<button class="button button-danger button-extra-small" onclick="hapusUlasan('${u.id}')"><i class="fas fa-trash"></i> Hapus</button>` : ''}
                    </div>
                </div>`;
            }
            html += '</div>';
        }
        areaKonten.innerHTML = html;
    }
</script>

                var indexId = 'faq_' + k + '_' + i;
                html += `
                <div class="faq-item" id="${indexId}">
                    <div class="faq-question" onclick="toggleFaq('${indexId}')">
                        <span>${escapeHtml(item.q)}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="faq-answer">${escapeHtml(item.a)}</div>
                </div>`;
            }
        }

        html += '<div class="faq-kategori-title">Hubungi Kami</div>';
        html += `<div class="card" style="text-align:center; background:#f8f9fa;">
            <p style="font-size:14px; color:#666; margin-bottom:10px;">Butuh bantuan lebih lanjut? Silakan chat langsung dengan Admin atau Customer Service.</p>
            <button class="button button-primary" onclick="navigasiKeHalaman('chat')"><i class="fas fa-comments"></i> Buka Chat</button>
        </div>`;
        html += '</div>';
        areaKonten.innerHTML = html;
    }

    function toggleFaq(id) {
        var element = document.getElementById(id);
        if (element) {
            if (element.classList.contains('active')) {
                element.classList.remove('active');
            } else {
                var allItems = document.querySelectorAll('.faq-item');
                for (var i = 0; i < allItems.length; i++) {
                    allItems[i].classList.remove('active');
                }
                element.classList.add('active');
            }
        }
    }
</script>

<script>
    // ===== FUNGSI UTAMA RENDER NOTIFIKASI =====
    function renderNotifikasi() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var areaKonten = document.getElementById('mainContent');
        if (!areaKonten) return;

        var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
        // Filter hanya notifikasi milik user yang login
        var notifSaya = dataNotif.filter(function(n) { return n.userId === user.id; });
        // Urutkan dari yang terbaru
        notifSaya.sort(function(a, b) { return new Date(b.waktu) - new Date(a.waktu); });

        // Hitung notifikasi belum dibaca
        var belumDibaca = 0;
        for (var i = 0; i < notifSaya.length; i++) {
            if (!notifSaya[i].sudahDibaca) belumDibaca++;
        }

        var html = '<div class="page-header"><h2>Notifikasi</h2><p>Pemberitahuan penting untuk Anda.</p>';
        
        // Tombol Tandai Semua & Demo
        html += '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">';
        if (belumDibaca > 0) {
            html += '<button class="button button-success button-small" onclick="tandaiSemuaDibaca()"><i class="fas fa-check-double"></i> Tandai Semua Dibaca (' + belumDibaca + ')</button>';
        }
        html += '<button class="button button-primary button-small" onclick="buatNotifikasiDemo()"><i class="fas fa-plus"></i> Buat Notifikasi Demo</button>';
        html += '</div></div>';

        if (notifSaya.length === 0) {
            html += '<div class="card"><div class="empty-state"><i class="fas fa-bell"></i><h3>Belum ada notifikasi</h3></div></div>';
        } else {
            html += '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px;">';
            for (var i = 0; i < notifSaya.length; i++) {
                var n = notifSaya[i];
                var colorClass = 'info';
                var icon = 'fa-info-circle';
                var bgColor = '#e3f2fd';
                var textColor = '#1976d2';
                if (n.tipe === 'success') { colorClass = 'success'; icon = 'fa-check-circle'; bgColor = '#e8f5e9'; textColor = '#2e7d32'; }
                else if (n.tipe === 'warning') { colorClass = 'warning'; icon = 'fa-exclamation-triangle'; bgColor = '#fff3e0'; textColor = '#e65100'; }
                else if (n.tipe === 'error') { colorClass = 'danger'; icon = 'fa-times-circle'; bgColor = '#ffebee'; textColor = '#c62828'; }

                // Tentukan kelas kartu berdasarkan status baca
                var cardClass = n.sudahDibaca ? 'notif-item-read' : 'notif-item-unread';
                var waktu = new Date(n.waktu).toLocaleString('id-ID');

                html += `
                <div class="card ${cardClass}" style="display:flex; flex-direction:column; padding:20px; transition:0.3s;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="notif-icon-box" style="background:${bgColor}; color:${textColor};">
                                <i class="fas ${icon}"></i>
                            </div>
                            <strong style="font-size:15px;">${escapeHtml(n.judul)}</strong>
                        </div>
                        <span style="font-size:11px; color:#999;">${waktu}</span>
                    </div>
                    <p style="font-size:14px; color:#555; margin:0 0 15px 0; line-height:1.5; flex:1;">${escapeHtml(n.pesan)}</p>
                    
                    <div style="display:flex; gap:8px; justify-content:flex-end; border-top:1px solid #f0f0f0; padding-top:12px;">
                        ${!n.sudahDibaca ? `<button class="button button-success button-extra-small" onclick="tandaiDibaca('${n.id}')"><i class="fas fa-check"></i> Tandai Dibaca</button>` : ''}
                        <button class="button button-danger button-extra-small" onclick="hapusNotifikasi('${n.id}')"><i class="fas fa-trash"></i> Hapus</button>

                </div>`;
            }
            html += '</div>';
        }
        areaKonten.innerHTML = html;
    }

    // ===== FUNGSI TANDAI SEMUA DI BACA =====
    function tandaiSemuaDibaca() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
        for (var i = 0; i < dataNotif.length; i++) {
            if (dataNotif[i].userId === user.id) {
                dataNotif[i].sudahDibaca = true;
            }
        }
        localStorage.setItem('2r_notifikasi', JSON.stringify(dataNotif));
        renderNotifikasi();
        tampilkanToast('Semua notifikasi telah ditandai dibaca!', 'success');
    }

    // ===== FUNGSI TANDAI SATU NOTIFIKASI =====
    function tandaiDibaca(id) {
        var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
        for (var i = 0; i < dataNotif.length; i++) {
            if (dataNotif[i].id === id) {
                dataNotif[i].sudahDibaca = true;
                break;
            }
        }
        localStorage.setItem('2r_notifikasi', JSON.stringify(dataNotif));
        renderNotifikasi();
        tampilkanToast('Notifikasi ditandai dibaca!', 'success');
    }

    // ===== FUNGSI HAPUS NOTIFIKASI =====
    function hapusNotifikasi(id) {
        if (!confirm('Yakin ingin menghapus notifikasi ini?')) return;
        var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
        var dataBaru = [];
        for (var i = 0; i < dataNotif.length; i++) {
            if (dataNotif[i].id !== id) {
                dataBaru.push(dataNotif[i]);
            }
        }
        localStorage.setItem('2r_notifikasi', JSON.stringify(dataBaru));
        renderNotifikasi();
        tampilkanToast('Notifikasi berhasil dihapus!', 'success');
    }

    // ===== FUNGSI BUAT NOTIFIKASI DEMO (UNTUK PENGUJIAN) =====
    function buatNotifikasiDemo() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var role = localStorage.getItem('2r_user_role') || 'Pengguna';
        var judul, pesan, tipe;
        var acak = Math.floor(Math.random() * 3);
        if (acak === 0) {
            judul = 'Selamat Datang!';
            pesan = 'Anda berhasil login sebagai ' + role + '. Selamat beraktivitas di Toko Online 2R!';
            tipe = 'success';
        } else if (acak === 1) {
            judul = 'Pengumuman Sistem';
            pesan = 'Aplikasi akan melakukan pemeliharaan pada pukul 02:00. Mohon persiapkan data Anda.';
            tipe = 'warning';
        } else {
            judul = 'Notifikasi Demo';
            pesan = 'Ini adalah contoh notifikasi untuk menguji fitur notifikasi Anda.';
            tipe = 'info';
        }
        var dataNotif = JSON.parse(localStorage.getItem('2r_notifikasi') || '[]');
        dataNotif.push({
            id: Date.now() + Math.random(),
            userId: user.id,
            judul: judul,
            pesan: pesan,
            tipe: tipe,
            sudahDibaca: false,
            waktu: new Date().toISOString()
        });
        localStorage.setItem('2r_notifikasi', JSON.stringify(dataNotif));
        renderNotifikasi();
        tampilkanToast('Notifikasi demo baru dibuat!', 'info');
    }
</script>

<script>
    function renderHapusAkun() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var areaKonten = document.getElementById('mainContent');
        var html = `
        <div class="page-header">
            <h2>Hapus Akun</h2>
            <p style="color:#d32f2f; font-weight:500;">Peringatan: Tindakan menghapus akun tidak dapat dibatalkan!</p>
        </div>
        <div class="card" style="border:2px solid #f44336;">
            <div class="card-header" style="color:#f44336;">
                <i class="fas fa-exclamation-triangle"></i> Konfirmasi Penghapusan Akun
            </div>
            <div style="margin-bottom:15px;">
                <p>Anda akan menghapus akun <strong>${escapeHtml(user.nama)} (${escapeHtml(user.id)})</strong> secara permanen. Semua data terkait akun ini akan dihapus dari sistem.</p>
                <p style="color:#666; font-size:13px;">Untuk keamanan, masukkan password Anda untuk mengonfirmasi tindakan ini.</p>
            </div>
            <div class="form-group">
                <label>Password Anda</label>
                <input type="password" id="hapusAkunPassword" class="form-input" placeholder="Masukkan password akun Anda">
            </div>
            <button class="button button-danger" onclick="prosesHapusAkun()" style="width:100%;"><i class="fas fa-trash-alt"></i> Hapus Akun Saya</button>
        </div>
        `;
        areaKonten.innerHTML = html;
    }

    async function prosesHapusAkun() {
        if (!confirm('Yakin ingin menghapus akun ini SELAMANYA? Data tidak dapat dikembalikan.')) return;
        if (!confirm('KONFIRMASI TERAKHIR: Hapus akun?')) return;

        var passwordInput = document.getElementById('hapusAkunPassword').value.trim();
        if (!passwordInput) {
            tampilkanToast('Masukkan password Anda terlebih dahulu!', 'warning');
            return;
        }

        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var dataAkun = getDataAkun();
        var targetAkun = null;
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === user.id) {
                targetAkun = dataAkun[i];
                break;
            }
        }
        if (!targetAkun) {
            tampilkanToast('Data akun tidak ditemukan!', 'error');
            return;
        }

        var cocok = await verifikasiPassword(passwordInput, targetAkun.password);
        if (!cocok) {
            tampilkanToast('Password yang Anda masukkan salah!', 'error');
            return;
        }

        var dataBaru = [];
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id !== user.id) {
                dataBaru.push(dataAkun[i]);
            }
        }
        simpanDataAkun(dataBaru);

        localStorage.removeItem('2r_user');
        localStorage.removeItem('2r_user_role');
        tampilkanToast('Akun Anda berhasil dihapus!', 'success');
        setTimeout(function() { location.reload(); }, 1500);
    }
</script>

    function bukaFormTambahProdukGudang() {
        var form = document.getElementById('formTambahProdukGudang');
        if (form) { form.classList.remove('hidden'); form.scrollIntoView({ behavior: 'smooth' }); setTimeout(function() { pasangEventListenerFotoGudang(); }, 100); }
    }
    function tutupFormTambahProdukGudang() {
        var form = document.getElementById('formTambahProdukGudang');
        if (form) form.classList.add('hidden');
    }
    function pasangEventListenerFotoGudang() {
        var input = document.getElementById('gudangFotoProduk');
        if (input) {
            var listener = function(e) {
                var file = e.target.files[0];
                if (file) {
                    document.getElementById('gudangNamaFoto').textContent = file.name;
                    var reader = new FileReader();
                    reader.onload = function(ev) { localStorage.setItem('2r_produk_gudang_foto_temp', ev.target.result); };
                    reader.readAsDataURL(file);
                }
            };
            input.removeEventListener('change', listener);
            input.addEventListener('change', listener);
        }
    }

    function simpanProdukGudang() {

        var nama = document.getElementById('gudangNamaProduk').value.trim();
        var kode = document.getElementById('gudangKodeProduk').value.trim();

        var satuan = document.getElementById('gudangSatuan').value;
        var kadaluarsa = document.getElementById('gudangTanggalKadaluarsa').value;
        var foto = localStorage.getItem('2r_produk_gudang_foto_temp') || '';
        var tanggalInput = document.getElementById('gudangTanggalInput').value;
        var penginput = document.getElementById('gudangPenginput').value.trim();
        if (!nama || !hargaBeli || !hargaJual || !stok || !kadaluarsa || !tanggalInput || !penginput) {
            tampilkanToast('Semua data wajib diisi!', 'warning'); return;
        }
        if (parseInt(hargaBeli) <= 0 || parseInt(hargaJual) <= 0 || parseInt(stok) < 0) {
            tampilkanToast('Harga dan stok harus bernilai positif!', 'warning'); return;
        }
        var hariIni = new Date(); hariIni.setHours(0,0,0,0);
        if (new Date(kadaluarsa) < hariIni) { tampilkanToast('Tanggal kadaluarsa tidak boleh kurang dari hari ini!', 'warning'); return; }
        var arrayFoto = foto ? [foto] : [];
        var produkBaru = {
            id: Date.now(), tokoId: user.id, namaProduk: nama, kodeProduk: kode || '-',
            hargaBeli: parseInt(hargaBeli), hargaJual: parseInt(hargaJual), jumlahStok: parseInt(stok),

    // ===== BLOK 8.7.4 - TABEL PRODUK GUDANG =====
    function tampilkanTabelProdukGudang(dataProduk, filter) {
        var dataFilter = [];
        if (filter === 'semua') dataFilter = dataProduk;
        else if (filter === 'terlaris') {
            dataFilter = dataProduk.slice().sort(function(a,b) { return b.totalTerjual - a.totalTerjual; }).slice(0,10);
        } else if (filter === 'tidakLaku') {
            dataFilter = dataProduk.filter(function(p) { return p.totalTerjual === 0 && p.jumlahStok > 10; });
        } else if (filter === 'kadaluarsa') {
            var hariIni = new Date();
            dataFilter = dataProduk.filter(function(p) {
                var kad = new Date(p.tanggalKadaluarsa);
                var selisih = Math.ceil((kad - hariIni) / (1000*60*60*24));
                return selisih <= 30 && selisih >= 0;
            });
        }
        if (dataFilter.length === 0) return '<div class="empty-state"><i class="fas fa-box-open"></i><h3>Tidak ada produk</h3></div>';
        var totalStok = 0, totalBeli = 0, totalJual = 0;
        for (var i = 0; i < dataFilter.length; i++) {
            totalStok += dataFilter[i].jumlahStok;
            totalBeli += dataFilter[i].hargaBeli * dataFilter[i].jumlahStok;
            totalJual += dataFilter[i].hargaJual * dataFilter[i].jumlahStok;
        }
        var totalKeuntungan = totalJual - totalBeli;
        var html = '<div class="table-container"><table class="table"><thead><tr><th>Nama Produk</th><th>Kode</th><th>Harga Beli</th><th>Harga Jual</th><th>Stok</th><th>Jenis</th><th>Satuan</th><th>Kadaluarsa</th><th>Tanggal Input</th><th>Penginput</th><th>Terjual</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < dataFilter.length; i++) {
            var p = dataFilter[i];
            var badge = 'badge-success';
            var kad = new Date(p.tanggalKadaluarsa);
            var selisih = Math.ceil((kad - new Date()) / (1000*60*60*24));
            if (selisih <= 30 && selisih >= 0) badge = 'badge-warning';
            else if (selisih < 0) badge = 'badge-danger';
            html += '<tr><td>' + escapeHtml(p.namaProduk) + '</td><td>' + escapeHtml(p.kodeProduk) + '</td><td>Rp ' + p.hargaBeli + '</td><td>Rp ' + p.hargaJual + '</td><td>' + p.jumlahStok + '</td><td>' + escapeHtml(p.jenis) + '</td><td>' + escapeHtml(p.satuan) + '</td><td><span class="badge ' + badge + '">' + p.tanggalKadaluarsa + '</span></td><td>' + (p.tanggalInput || '-') + '</td><td>' + escapeHtml(p.namaPenginput || '-') + '</td><td>' + p.totalTerjual + '</td><td>';
            html += '<button class="button button-primary button-extra-small" onclick="renderEditProdukGudang(' + p.id + ')"><i class="fas fa-edit"></i> Edit</button>';
            html += '<button class="button button-danger button-extra-small" onclick="hapusProdukGudang(' + p.id + ')"><i class="fas fa-trash"></i> Hapus</button></td></tr>';
        }
        html += '<tr style="background:#f0fdf4; font-weight:700; border-top:3px solid #2e7d32;"><td colspan="2" style="text-align:right;">TOTAL</td><td style="color:#d32f2f;">Rp ' + totalBeli.toLocaleString('id-ID') + '</td><td style="color:#1976d2;">Rp ' + totalJual.toLocaleString('id-ID') + '</td><td>' + totalStok + '</td><td colspan="2"></td><td colspan="2"></td><td></td><td></td><td><span style="color:#2e7d32;">Keuntungan: Rp ' + totalKeuntungan.toLocaleString('id-ID') + '</span></td></tr>';
        html += '</tbody></table></div>';
        return html;
    }
    function tampilkanProdukGudang(filter) {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');

        var saya = semua.filter(function(p) { return p.tokoId === user.id; });

        html += '<input type="file" id="editGudangFotoProduk" accept=".jpg,.jpeg,.png" style="display:none;">';
        html += '<button class="button button-primary button-small" onclick="document.getElementById(\'editGudangFotoProduk\').click();">Pilih Foto Baru</button>';
        html += '<span id="editGudangNamaFoto" style="font-size:12px;color:#888;margin-left:10px;">Kosongkan jika tidak ganti</span></div></div>';
        html += '<button class="button button-primary margin-top-10" onclick="simpanEditProdukGudang(' + target.id + ')"><i class="fas fa-save"></i> Simpan Perubahan</button></div>';
        areaKonten.innerHTML = html;
        setTimeout(function() { pasangEventListenerFotoEdit(); }, 300);
    }
    function pasangEventListenerFotoEdit() {
        var input = document.getElementById('editGudangFotoProduk');
        if (input) {
            var listener = function(e) {
                var file = e.target.files[0];
                if (file) {
                    document.getElementById('editGudangNamaFoto').textContent = file.name;
                    var reader = new FileReader();
                    reader.onload = function(ev) { localStorage.setItem('2r_edit_produk_gudang_foto_temp', ev.target.result); };
                    reader.readAsDataURL(file);
                }
            };
            input.removeEventListener('change', listener);
            input.addEventListener('change', listener);
        }
    }
    function simpanEditProdukGudang(id) {
        var semua = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
        var index = -1;
        for (var i = 0; i < semua.length; i++) {
            if (semua[i].id === id) { index = i; break; }
        }
        if (index === -1) { tampilkanToast('Produk tidak ditemukan!', 'error'); return; }
        var nama = document.getElementById('editGudangNamaProduk').value.trim();
        var kode = document.getElementById('editGudangKodeProduk').value.trim();

        var hargaJual = document.getElementById('editGudangHargaJual').value.trim();

            tampilkanToast('Semua data wajib diisi!', 'warning'); return;
        }
        semua[index].namaProduk = nama;
        semua[index].kodeProduk = kode || '-';
        semua[index].hargaBeli = parseInt(hargaBeli);

    function downloadExcelStokGudang() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var semua = JSON.parse(localStorage.getItem('2r_produk_gudang') || '[]');
        var produkSaya = semua.filter(function(p) { return p.tokoId === user.id; });
        if (produkSaya.length === 0) { tampilkanToast('Belum ada produk untuk di-download!', 'warning'); return; }
        var totalStok = 0, totalBeli = 0, totalJual = 0;
        for (var i = 0; i < produkSaya.length; i++) {
            totalStok += produkSaya[i].jumlahStok;
            totalBeli += produkSaya[i].hargaBeli * produkSaya[i].jumlahStok;
            totalJual += produkSaya[i].hargaJual * produkSaya[i].jumlahStok;
        }
        var totalKeuntungan = totalJual - totalBeli;
        var csv = "Nama Produk;Kode Produk;Harga Beli;Harga Jual;Stok;Jenis;Satuan;Tanggal Kadaluarsa;Tanggal Input;Penginput;Total Terjual\n";
        for (var i = 0; i < produkSaya.length; i++) {
            var p = produkSaya[i];
            csv += '"' + p.namaProduk + '";"' + p.kodeProduk + '";' + p.hargaBeli + ';' + p.hargaJual + ';' + p.jumlahStok + ';"' + p.jenis + '";"' + p.satuan + '";"' + p.tanggalKadaluarsa + '";"' + (p.tanggalInput || '-') + '";"' + (p.namaPenginput || '-') + '";' + p.totalTerjual + '\n';
        }
        csv += ';TOTAL;' + totalBeli + ';' + totalJual + ';' + totalStok + ';;;;;;' + totalKeuntungan + '\n';
        var blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        var url = URL.createObjectURL(blob);
        link.href = url;
        link.download = 'Laporan_Stok_Gudang_' + new Date().toISOString().slice(0,10) + '.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        tampilkanToast('Data berhasil didownload sebagai CSV/Excel!', 'success');
    }

    function tampilkanGridProdukKelola(dataProduk, filter) {

    <script>
// ===== FUNGSI KOMPRESI GAMBAR UNTUK DEMO =====
function compressImage(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const scaleSize = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scaleSize;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
        };
        reader.onerror = reject;
    });
}
</script>

<script>
// ===== BLOK 8.10.1 - RENDER DAFTAR PERCAKAPAN (INBOX) =====
function renderChat() {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var areaKonten = document.getElementById('mainContent');
    if (!areaKonten) return;

    var dataAkun = getDataAkun();
    var semuaPesan = JSON.parse(localStorage.getItem('2r_chat_messages') || '[]');
    
    var pesanSaya = semuaPesan.filter(function(p) {
        return p.pengirim === user.id || p.penerima === user.id;
    });

    var daftarLawan = {};
    for (var i = 0; i < pesanSaya.length; i++) {
        var idLawan = (pesanSaya[i].pengirim === user.id) ? pesanSaya[i].penerima : pesanSaya[i].pengirim;
        var roleLawan = '';
        for (var k = 0; k < dataAkun.length; k++) {
            if (dataAkun[k].id === idLawan) {
                roleLawan = dataAkun[k].role;
                break;
            }
        }
        if (roleLawan === 'superadmin') { continue; }

        if (!daftarLawan[idLawan]) {
            daftarLawan[idLawan] = { id: idLawan, pesanTerakhir: pesanSaya[i], waktu: new Date(pesanSaya[i].waktu) };
        } else {
            if (new Date(pesanSaya[i].waktu) > daftarLawan[idLawan].waktu) {
                daftarLawan[idLawan].pesanTerakhir = pesanSaya[i];
                daftarLawan[idLawan].waktu = new Date(pesanSaya[i].waktu);
            }
        }
    }

    var listLawan = Object.values(daftarLawan);
    listLawan.sort(function(a, b) { return b.waktu - a.waktu; });

    var html = '<div class="page-header"><h2>Chat</h2><p>Daftar percakapan Anda. ID lawan bicara ditampilkan untuk memudahkan balasan.</p></div>';

    if (listLawan.length === 0) {
        html += '<div class="card"><div class="empty-state"><i class="fas fa-comments"></i><h3>Belum ada percakapan</h3><p>Silakan pilih ID tujuan di bawah (SuperAdmin tidak ditampilkan).</p></div></div>';
    } else {
        html += '<div class="card"><div class="table-container"><table class="table"><thead><tr><th>ID Lawan</th><th>Pesan Terakhir</th><th>Waktu</th><th>Aksi</th></tr></thead><tbody>';
        for (var i = 0; i < listLawan.length; i++) {
            var lawan = listLawan[i];
            var namaLawan = lawan.id;
            for (var j = 0; j < dataAkun.length; j++) {
                if (dataAkun[j].id === lawan.id) {
                    namaLawan = dataAkun[j].nama || dataAkun[j].username;
                    break;
                }
            }
            var isiPesan = lawan.pesanTerakhir.isi;
            var waktu = new Date(lawan.pesanTerakhir.waktu).toLocaleString('id-ID');
            html += '<tr><td><strong>' + escapeHtml(lawan.id) + '</strong> (' + escapeHtml(namaLawan) + ')</td>';
            html += '<td>' + escapeHtml(isiPesan.length > 50 ? isiPesan.substring(0, 50) + '...' : isiPesan) + '</td>';
            html += '<td>' + waktu + '</td>';
            html += '<td><button class="button button-primary button-small" onclick="bukaChat(\'' + lawan.id + '\')"><i class="fas fa-reply"></i> Balas</button></td></tr>';
        }
        html += '</tbody></table></div></div>';
    }

    var opsiDropdown = '<option value="">-- Pilih ID Tujuan --</option>';
    for (var i = 0; i < dataAkun.length; i++) {
        var a = dataAkun[i];
        if (a.id !== user.id && a.role !== 'superadmin') {
            var tampilan = a.id + ' - ' + a.nama + ' (' + a.role + ')';
            opsiDropdown += '<option value="' + a.id + '">' + escapeHtml(tampilan) + '</option>';

    areaKonten.innerHTML = html;
}

// ===== BLOK 8.10.2 - RENDER RUANG CHAT DENGAN LAWAN TERTENTU =====
function renderChatRoom(targetId) {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var areaKonten = document.getElementById('mainContent');
    if (!areaKonten) return;
    if (!targetId || targetId.trim() === '') { tampilkanToast('ID tujuan tidak boleh kosong!', 'warning'); return; }
    if (targetId === user.id) { tampilkanToast('Anda tidak bisa chat dengan diri sendiri!', 'warning'); return; }

    var dataAkun = getDataAkun();
    var targetValid = false;
    var namaTarget = targetId;
    for (var i = 0; i < dataAkun.length; i++) {
        if (dataAkun[i].id === targetId) {
            targetValid = true;
            namaTarget = dataAkun[i].nama || dataAkun[i].username;
            break;
        }
    }
    if (!targetValid) { tampilkanToast('ID tujuan tidak ditemukan!', 'error'); return; }

    var semuaPesan = JSON.parse(localStorage.getItem('2r_chat_messages') || '[]');
    var obrolan = semuaPesan.filter(function(p) {
        return (p.pengirim === user.id && p.penerima === targetId) ||
               (p.pengirim === targetId && p.penerima === user.id);
    });
    obrolan.sort(function(a, b) { return new Date(a.waktu) - new Date(b.waktu); });

    var html = '<div class="page-header"><h2>Chat dengan ' + escapeHtml(namaTarget) + '</h2><p>ID Lawan: <strong>' + escapeHtml(targetId) + '</strong></p>';
    html += '<button class="button button-primary button-small" onclick="renderChat()"><i class="fas fa-arrow-left"></i> Kembali ke Daftar</button></div>';

    html += '<div class="card" style="max-height:400px; overflow-y:auto; margin-bottom:10px;" id="chatRoomContainer">';
    if (obrolan.length === 0) {
        html += '<div class="empty-state" style="padding:20px;"><i class="fas fa-comment-dots"></i><h3>Belum ada pesan</h3><p>Mulai chat dengan mengirim pesan di bawah.</p></div>';
    } else {
        for (var i = 0; i < obrolan.length; i++) {
            var p = obrolan[i];
            var isMe = (p.pengirim === user.id);
            var waktu = new Date(p.waktu).toLocaleString('id-ID');
            html += '<div style="display:flex; flex-direction:' + (isMe ? 'row-reverse' : 'row') + '; margin-bottom:10px;">';
            html += '<div style="max-width:70%; background:' + (isMe ? '#e3f2fd' : '#f1f8e9') + '; padding:10px 15px; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,0.05);">';
            html += '<div style="font-size:12px; color:#888; margin-bottom:3px;">' + (isMe ? 'Anda' : escapeHtml(p.pengirim)) + ' • ' + waktu + '</div>';
            html += '<div style="font-size:14px;">' + escapeHtml(p.isi) + '</div>';
            html += '</div></div>';
        }
    }
    html += '</div>';

    html += '<div class="card"><div class="grid-2" style="gap:10px;">';
    html += '<div><input type="text" id="pesanInput" class="form-input" placeholder="Ketik pesan..." style="width:100%;"></div>';
    html += '<div style="display:flex; gap:5px;"><button class="button button-primary" onclick="kirimPesan(\'' + targetId + '\')"><i class="fas fa-paper-plane"></i> Kirim</button>';
    html += '<button class="button button-success button-small" onclick="document.getElementById(\'pesanInput\').value=\'ID: ' + user.id + ' - Halo, ada yang bisa dibantu?\'">Cepat Balas</button></div></div></div>';

    areaKonten.innerHTML = html;

    setTimeout(function() {
        var container = document.getElementById('chatRoomContainer');
        if (container) container.scrollTop = container.scrollHeight;
        var input = document.getElementById('pesanInput');
        if (input) input.focus();
    }, 100);
}
// ===== AKHIR BLOK 8.10.2 =====

// ===== BLOK 8.10.3 - FUNGSI KIRIM PESAN =====
function kirimPesan(targetId) {
    var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
    var input = document.getElementById('pesanInput');
    if (!input) return;
    var isi = input.value.trim();
    if (!isi) { tampilkanToast('Pesan tidak boleh kosong!', 'warning'); return; }
    if (targetId === user.id) { tampilkanToast('Tidak bisa mengirim ke diri sendiri!', 'warning'); return; }

    var pesanBaru = {
        id: Date.now(),
        pengirim: user.id,
        penerima: targetId,
        isi: isi,
        waktu: new Date().toISOString()
    };

    var semuaPesan = JSON.parse(localStorage.getItem('2r_chat_messages') || '[]');
    semuaPesan.push(pesanBaru);
    localStorage.setItem('2r_chat_messages', JSON.stringify(semuaPesan));

    tampilkanToast('Pesan terkirim!', 'success');
    renderChatRoom(targetId);
}
// ===== AKHIR BLOK 8.10.3 =====

// ===== BLOK 8.10.4 - FUNGSI NAVIGASI CHAT =====
function bukaChat(targetId) {
    if (!targetId || targetId.trim() === '') {
        renderChat();
        return;
    }
    renderChatRoom(targetId.trim());
}
// ===== AKHIR BLOK 8.10.4 =====
</script>

    function simpanAnnouncement() {
        try {
            var judul = document.getElementById('annJudul').value.trim();

            var gambarTemp = localStorage.getItem('2r_announcement_gambar_temp') || '';

                    judul: judul,

                    gambar: gambarTemp,
                    waktu: new Date().toISOString()
                });

                    dataAnn[editIndex].judul = judul;
                    dataAnn[editIndex].deskripsi = deskripsi;
                    // Ganti gambar hanya jika user mengupload gambar baru
                    if (gambarTemp) {
                        dataAnn[editIndex].gambar = gambarTemp;

                    tampilkanToast('Pengumuman berhasil diperbarui!', 'success');
                } else {
                    tampilkanToast('Data tidak ditemukan!', 'error');

        var container = document.getElementById('formAnnouncementContainer');
        if (!container) return;
        
        container.classList.remove('hidden');
        document.getElementById('formAnnouncementTitle').textContent = 'Edit Pengumuman';

            container.scrollIntoView({ behavior: 'smooth' });

        renderPapanInformasi();
        tampilkanToast('Pengumuman berhasil dihapus!', 'success');

            tampilkanToast('Terjadi error: ' + error.message, 'error');
        }
    }

    // ===== EDIT DATA IKLAN =====
    function editIklan(index) {
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        if (index < 0 || index >= dataIklan.length) {
            tampilkanToast('Iklan tidak ditemukan!', 'error');
            return;
        }
        var iklan = dataIklan[index];
        document.getElementById('formIklanContainer').classList.remove('hidden');
        document.getElementById('formIklanTitle').textContent = 'Edit Iklan';
        document.getElementById('iklanEditIndex').value = index;
        document.getElementById('iklanJudul').value = iklan.judul;
        document.getElementById('iklanDeskripsi').value = iklan.deskripsi;
        document.getElementById('iklanWarna').value = iklan.warna || '#FF6B00';
        var jmlGambar = (iklan.gambar && Array.isArray(iklan.gambar)) ? iklan.gambar.length : 0;
        document.getElementById('iklanNamaGambar').textContent = (jmlGambar > 0) ? 'Gambar sudah ada (' + jmlGambar + ' file)' : 'Belum ada gambar';
        localStorage.removeItem('2r_iklan_gambar_temp');
        document.getElementById('formIklanContainer').scrollIntoView({ behavior: 'smooth' });
    }

    // ===== HAPUS DATA IKLAN =====
    function hapusIklan(index) {
        if (!confirm('Yakin ingin menghapus iklan ini?')) return;
        var dataIklan = JSON.parse(localStorage.getItem('2r_iklan') || '[]');
        dataIklan.splice(index, 1);
        localStorage.setItem('2r_iklan', JSON.stringify(dataIklan));
        renderMenuIklan();
        tampilkanToast('Iklan berhasil dihapus!', 'success');
    }
</script>

<script>
    // ===== 1. SIMPAN ULASAN BARU + SIMPAN ID TERAKHIR =====
    function simpanUlasan() {
        var user = JSON.parse(localStorage.getItem('2r_user') || '{}');
        var targetId = document.getElementById('ulasanTargetId').value.trim();
        var rating = parseInt(document.getElementById('ulasanRating').value);
        var komentar = document.getElementById('ulasanKomentar').value.trim();

        if (!targetId) { tampilkanToast('Masukkan ID Toko/Ojek target!', 'warning'); return; }
        if (!komentar) { tampilkanToast('Komentar wajib diisi!', 'warning'); return; }

        var dataAkun = getDataAkun();
        var targetAkun = null;
        var targetRole = '';
        var targetNama = '';
        for (var i = 0; i < dataAkun.length; i++) {
            if (dataAkun[i].id === targetId) {
                targetAkun = dataAkun[i];
                targetNama = targetAkun.nama || targetAkun.username;
                targetRole = targetAkun.role;
                break;
            }
        }
        if (!targetAkun) { tampilkanToast('ID Akun target tidak ditemukan!', 'error'); return; }
        if (targetAkun.role === 'superadmin' || targetAkun.role === 'customer') {
            tampilkanToast('Anda tidak bisa memberi ulasan ke akun ini!', 'error');
            return;
        }

        var dataUlasan = JSON.parse(localStorage.getItem('2r_ulasan') || '[]');
        dataUlasan.push({
            id: 'ULS-' + Date.now(),
            pengirimId: user.id,
            pengirimNama: user.nama || user.username,
            targetId: targetId,
            targetNama: targetNama,
            targetRole: targetRole,
            rating: rating,
            komentar: komentar,
            balasan: '',
            waktu: new Date().toISOString()
        });

        localStorage.setItem('2r_ulasan', JSON.stringify(dataUlasan));
        localStorage.setItem('2r_last_review_target', targetId); // Menyimpan ID terakhir

        document.getElementById('ulasanTargetId').value = '';
        document.getElementById('ulasanKomentar').value = '';
        tampilkanToast('Ulasan berhasil dikirim!', 'success');
        renderUlasanRating();
    }

    // ===== 2. KIRIM BALASAN (TOKO/OJEK) =====
    function kirimBalasan(idUlasan, indexInput) {
        var balasan = document.getElementById('balasanInput_' + indexInput).value.trim();
        if (!balasan) { tampilkanToast('Tulis balasan Anda terlebih dahulu!', 'warning'); return; }

        var dataUlasan = JSON.parse(localStorage.getItem('2r_ulasan') || '[]');
        for (var i = 0; i < dataUlasan.length; i++) {
            if (dataUlasan[i].id === idUlasan) {
                dataUlasan[i].balasan = balasan;
                break;
            }
        }
        localStorage.setItem('2r_ulasan', JSON.stringify(dataUlasan));
        tampilkanToast('Balasan berhasil dikirim!', 'success');
        renderUlasanRating();
    }

    // ===== 3. HAPUS ULASAN (ADMIN / CUSTOMER) =====
    function hapusUlasan(idUlasan) {
        if (!confirm('Yakin ingin menghapus ulasan ini?')) return;
        var dataUlasan = JSON.parse(localStorage.getItem('2r_ulasan') || '[]');
        var dataBaru = [];
        for (var i = 0; i < dataUlasan.length; i++) {
            if (dataUlasan[i].id !== idUlasan) {
                dataBaru.push(dataUlasan[i]);
            }
        }
        localStorage.setItem('2r_ulasan', JSON.stringify(dataBaru));
        tampilkanToast('Ulasan berhasil dihapus!', 'success');
        renderUlasanRating();
    }
</script>

    <!-- ===== BLOK 8.15 - JS_RENDER_BACKUP_RESTORE ===== -->
<script>
    // ===== BLOK 8.15.1 - RENDER HALAMAN BACKUP & RESTORE =====
    function renderBackupRestore() {
        var role = localStorage.getItem('2r_user_role');
        if (role !== 'superadmin') {
            tampilkanToast('Hanya SuperAdmin yang dapat mengakses halaman ini!', 'error');
            return;
        }

        var areaKonten = document.getElementById('mainContent');
        if (!areaKonten) return;

        var html = `
        <div class="page-header">
            <h2><i class="fas fa-database" style="color:#FF6B00;"></i> Backup & Restore Aplikasi</h2>
            <p>Backup (Cadangkan) seluruh kode aplikasi dan data lokal untuk keamanan, atau pulihkan (Restore) data jika terjadi masalah.</p>
        </div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
            
            <!-- ===== CARD BACKUP ===== -->
            <div class="card" style="border-top:4px solid #4CAF50;">
                <div class="card-header" style="color:#2e7d32; font-weight:700;">
                    <i class="fas fa-download"></i> Backup
                </div>
                <div style="margin-bottom:15px;">
                    <p style="font-size:14px; color:#666;">Unduh file <strong>index.html</strong> (kode aplikasi) dan file <strong>data.json</strong> (seluruh database demo).</p>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="button button-success" onclick="downloadIndexHTML()" style="width:100%; justify-content:center;">
                        <i class="fas fa-file-code"></i> Download Index.html (Kode)
                    </button>
                    <button class="button button-primary" onclick="downloadDataBackup()" style="width:100%; justify-content:center; background:#2196F3;">
                        <i class="fas fa-file-archive"></i> Download Data Backup (JSON)
                    </button>
                </div>
            </div>

            <!-- ===== CARD RESTORE ===== -->
            <div class="card" style="border-top:4px solid #f44336;">
                <div class="card-header" style="color:#c62828; font-weight:700;">
                    <i class="fas fa-upload"></i> Restore (Pulihkan Data)
                </div>
                <div style="margin-bottom:15px;">
                    <p style="font-size:14px; color:#666;">Unggah file <strong>.json</strong> hasil backup untuk mengembalikan data pengguna, produk, dan pengaturan ke browser ini.</p>
                    <p style="font-size:12px; color:#d32f2f; font-weight:600; margin-top:5px;">⚠️ Peringatan: Proses restore akan MENIMPA semua data yang ada saat ini.</p>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div class="upload-area" id="restoreUploadArea" style="padding:15px; cursor:pointer;">
                        <i class="fas fa-cloud-upload-alt" style="font-size:30px; color:#ddd;"></i>
                        <p style="font-size:13px; margin-top:5px;">Klik untuk pilih file JSON backup</p>
                        <input type="file" id="restoreFileInput" accept=".json" style="display:none;">
                    </div>
                    <button class="button button-danger" onclick="restoreDataFromBackup()" style="width:100%; justify-content:center;">
                        <i class="fas fa-trash-restore"></i> Pulihkan Data
                    </button>
                </div>
            </div>
        </div>
        `;

        areaKonten.innerHTML = html;

        // Setup event listener setelah DOM terbentuk
        setTimeout(function() {
            var uploadArea = document.getElementById('restoreUploadArea');
            var fileInput = document.getElementById('restoreFileInput');
            if (uploadArea && fileInput) {
                uploadArea.onclick = function() { fileInput.click(); };
                fileInput.onchange = function(e) {
                    var file = e.target.files[0];
                    if (file) {
                        document.getElementById('restoreUploadArea').style.borderColor = '#4CAF50';
                        document.getElementById('restoreUploadArea').innerHTML = `
                            <i class="fas fa-check-circle" style="font-size:30px; color:#4CAF50;"></i>
                            <p style="font-size:13px; color:#2e7d32; margin-top:5px; font-weight:600;">Terpilih: ${escapeHtml(file.name)}</p>
                            <p style="font-size:12px; color:#888;">Klik tombol Pulihkan Data di bawah.</p>
                        `;
                    }
                };
            }
        }, 300);
    }
    // ===== AKHIR BLOK 8.15.1 =====

    // ===== BLOK 8.15.2 - DOWNLOAD INDEX.HTML =====
    function downloadIndexHTML() {
        try {
            var fullHTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            var blob = new Blob([fullHTML], { type: 'text/html; charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'TokoOnline2R_Backup_' + new Date().toISOString().slice(0,10) + '.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            tampilkanToast('Kode aplikasi berhasil didownload!', 'success');
        } catch (error) {
            console.error("ERROR DOWNLOAD HTML:", error);
            tampilkanToast('Gagal mendownload kode aplikasi. Coba lagi.', 'error');
        }
    }
    // ===== AKHIR BLOK 8.15.2 =====

    // ===== BLOK 8.15.3 - DOWNLOAD DATA BACKUP (JSON) =====
    function downloadDataBackup() {
        try {
            var backupData = {};
            // Ambil semua key yang berawalan "2r_" di localStorage
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                if (key && key.startsWith('2r_')) {
                    backupData[key] = localStorage.getItem(key);
                }
            }

            // Tambahkan timestamp dan versi
            backupData['_backup_meta'] = {
                version: '1.0',
                timestamp: new Date().toISOString(),
                source: 'Toko Online 2R Demo'
            };

            var jsonString = JSON.stringify(backupData, null, 2);
            var blob = new Blob([jsonString], { type: 'application/json; charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'TokoOnline2R_Data_Backup_' + new Date().toISOString().slice(0,10) + '.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            tampilkanToast('Backup data (JSON) berhasil didownload!', 'success');
        } catch (error) {
            console.error("ERROR DOWNLOAD DATA:", error);
            tampilkanToast('Gagal mendownload data backup!', 'error');
        }
    }
    // ===== AKHIR BLOK 8.15.3 =====

    // ===== BLOK 8.15.4 - RESTORE DATA DARI BACKUP =====
    function restoreDataFromBackup() {
        var fileInput = document.getElementById('restoreFileInput');
        if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
            tampilkanToast('Silakan pilih file JSON backup terlebih dahulu!', 'warning');
            return;
        }

        var file = fileInput.files[0];
        var reader = new FileReader();

        reader.onload = function(e) {
            try {
                var restoreData = JSON.parse(e.target.result);
                var count = 0;

                // Loop untuk merestore semua data
                for (var key in restoreData) {
                    if (restoreData.hasOwnProperty(key)) {
                        // Skip meta data
                        if (key === '_backup_meta') continue;
                        localStorage.setItem(key, restoreData[key]);
                        count++;
                    }
                }

                tampilkanToast('Berhasil memulihkan ' + count + ' data! Halaman akan dimuat ulang.', 'success');
                
                // Reset UI
                var uploadArea = document.getElementById('restoreUploadArea');
                if (uploadArea) {
                    uploadArea.style.borderColor = '#ddd';
                    uploadArea.innerHTML = `
                        <i class="fas fa-cloud-upload-alt" style="font-size:30px; color:#ddd;"></i>
                        <p style="font-size:13px; margin-top:5px;">Klik untuk pilih file JSON backup</p>
                    `;
                }
                fileInput.value = '';

                // Reload otomatis agar data user terbaca ulang
                setTimeout(function() {
                    location.reload();
                }, 2000);

            } catch (parseError) {
                tampilkanToast('Format file JSON tidak valid atau rusak!', 'error');
            }
        };

        reader.onerror = function() {
            tampilkanToast('Gagal membaca file backup!', 'error');
        };

        reader.readAsText(file);
    }
    // ===== AKHIR BLOK 8.15.4 =====
</script>
